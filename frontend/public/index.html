<!doctype html>
<html lang="en">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <meta
      name="description"
      content="PAM Beauty - Premium wigs, hair products, and beauty accessories."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap"
      rel="stylesheet"

    <!-- Favicon -->

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <title>PAM Beauty</title>

    <!-- Splash Styles -->
    <style>
      #pam-splash {
        position: fixed;
        inset: 0;
        background: #f7f2ee;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }

      #pam-splash img {
        width: 120px;
        height: auto;
        opacity: 0;
        animation: pamFade 1.2s ease forwards;
      }

      @keyframes pamFade {
        to {
          opacity: 1;
        }
      }

      .pam-loaded #pam-splash {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash -->
    <div id="pam-splash">
      <img src="%PUBLIC_URL%/logo192.png" alt="PAM Beauty" />
    </div>

    <div id="root"></div>

    <!-- Remove splash when app loads -->
    <script>
      window.addEventListener("load", function () {
        document.body.classList.add("pam-loaded");
        setTimeout(function () {
          var splash = document.getElementById("pam-splash");
          if (splash) splash.remove();
        }, 700);
      });
    </script>
